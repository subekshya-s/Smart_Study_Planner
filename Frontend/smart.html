<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Study Planner</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
<style>

body {
    background: #f8f9fa;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
}

/* Sidebar */
.sidebar {
    width: 240px;
    height: 100vh;
    position: fixed;
    background: #ffffff;
    border-right: 1px solid #eee;
    padding: 20px;
}

.sidebar h4 {
    font-weight: 600;
}

.sidebar a {
    display: block;
    padding: 10px;
    border-radius: 8px;
    text-decoration: none;
    color: #333;
    margin-bottom: 5px;
    transition: 0.2s;
}

.sidebar a:hover {
    background: #f1f3f5;
}

/* Main */
.main {
    margin-left: 250px;
    padding: 30px;
}

/* Cards */
.card {
    border: none;
    border-radius: 14px;
    background: #fff;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-3px);
}

/* Inputs */
.form-control {
    border-radius: 10px;
    border: 1px solid #ddd;
}

.form-control:focus {
    box-shadow: none;
    border-color: #000;
}

/* Buttons */
.btn-dark {
    border-radius: 10px;
}

/* Timer */
.timer {
    font-size: 2.5rem;
    font-weight: 600;
}

/* List */
.list-item {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #eee;
}

.check-btn {
    border: none;
    background: black;
    color: white;
    border-radius: 6px;
    padding: 3px 8px;
}

</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4>📘 Planner</h4>
    <a href="#">Dashboard</a>
    <a href="#">Subjects</a>
    <a href="#">Tasks</a>
    <a href="#">Focus</a>
    <a href="#">Progress</a>
</div>

<!-- Main -->
<div class="main">

    <h3 class="mb-4">Smart Study Planner</h3>

    <div class="row g-4">

        <!-- Subjects -->
<div class="col-md-4">
    <div class="card p-3">
        <h6>Subjects</h6>

        <input id="subjectName" class="form-control mb-2" placeholder="Subject name">
        <input id="subjectHours" type="number" class="form-control mb-2" placeholder="Weekly hours">

        <button class="btn btn-dark w-100" onclick="addSubject()">Add</button>

        <div id="subjectList" class="mt-3"></div>
    </div>
</div>

        <!-- Tasks -->
        <div class="col-md-4">
            <div class="card p-3">
                <h6>Tasks</h6>
                <input class="form-control mb-2" placeholder="Add task">
                <button class="btn btn-dark w-100">Add</button>

                <!-- Sample UI items -->
                <div class="mt-3">
                    <div class="list-item">
                        Study HTML
                        <button class="check-btn">✔</button>
                    </div>
                    <div class="list-item">
                        Revise CSS
                        <button class="check-btn">✔</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Timer -->
        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h6>Focus Timer</h6>
                <div class="timer">25:00</div>
                <button class="btn btn-dark mt-2">Start</button>
                <button class="btn btn-outline-dark mt-2">Reset</button>
            </div>
        </div>

    </div>

    <! -- Note taker -->
    <div class = 
</div>
<script>
let subjects = []
function addSubject() {
    let name = document.getElementById("subjectName").value
    let hours = document.getElementById("subjectHours").value
    if (name === "" || hours === "") {
        alert("Fill all fields")
        return
    }
    subjects.push({ name: name, hours: hours })
    displaySubjects()
    // clear input
    document.getElementById("subjectName").value = ""
    document.getElementById("subjectHours").value = ""
}
function displaySubjects() {
    let list = document.getElementById("subjectList")
    list.innerHTML = ""
    for (let i = 0; i < subjects.length; i++) {
        list.innerHTML += `
            <div class="list-item">
                <div>
                    <b>${subjects[i].name}</b><br>
                    <small>${subjects[i].hours} hrs/week</small>
                </div>
                <div>
                    <button onclick="editSubject(${i})">✏️</button>
                    <button onclick="deleteSubject(${i})">❌</button>
                </div>
            </div>
        `
    }
}
function deleteSubject(index) {
    subjects.splice(index, 1)
    displaySubjects()
}
function editSubject(index) {
   let newName = prompt("Edit name", subjects[index].name)
    let newHours = prompt("Edit hours", subjects[index].hours)
    if (newName && newHours) {
        subjects[index].name = newName
        subjects[index].hours = newHours
        displaySubjects()
    }
}
</script>


</body>
</html>
