name: Django CI

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend/smart_study_planner  # ← all steps run from here

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Install pytest-django
        run: pip install pytest pytest-django

      - name: Run Tests
        run: pytest
        env:
          SECRET_KEY: "ci-fake-secret-key-for-testing"